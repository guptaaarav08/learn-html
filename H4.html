<!DOCTYPE html>
<html lang="en">

<head>
  <title>HTML 4</title>
</head>

<body>
  <!-- EMBED -->
  <embed src="pdf1.pdf" type="application/pdf" height="500" width="500">
  <!-- OBJECT -->

  <object data="pdf1.pdf" height="500" width="500" type="application/pdf"></object>

  <!-- iFRAME -->
  <iframe src="pdf1.pdf" height="500" width="500"></iframe>
<br>
  <!-- YOUTUBE VIDEO -->
  <!-- go to youtube and open the video , click on share and embed video -->
  <iframe width="1512" height="315" src="https://www.youtube.com/embed/7FMYz5PYrIo?si=8I-PHEWoS2ADz2vk" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

  <!-- EMBEDDING GOOGLE MAPS -->
  <!-- go to google map and click on share then use the embedded option as done above for the youtube video -->
  <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d4543.047650318502!2d78.03956727622696!3d27.175149548761738!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x39747121d702ff6d%3A0xdd2ae4803f767dde!2sTaj%20Mahal!5e1!3m2!1sen!2sin!4v1779601899752!5m2!1sen!2sin" width="1512" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
<br><br><br>

  <!-- ENTITIES -->
    <!-- BY NAME -->
      <!-- <div> breaks into three parts '<' , 'div' , '>' -->
      <!-- '<' means less than(lt) , '>' means greater than(gt) -->
      <!-- to print by name we write -> '&name;' -->
      &lt;div&gt;
    <!-- BY NUMBER -->
      <!-- to print by number we write &#number; -->
      &#60;div&#62;
  

  </body>

</html>
